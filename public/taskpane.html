<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Archív Ravafol</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <link rel="icon" href="assets/icon-32.png" />
  <link rel="stylesheet" href="taskpane.css" />
</head>
<body>
  <header>
    <span class="title">📨 Archív Ravafol</span>
    <button id="logoutBtn" class="link hidden">Odhlásiť</button>
  </header>

  <!-- Prihlásenie -->
  <section id="loginView" class="view">
    <p class="muted">Prihlás sa svojím archívnym účtom.</p>
    <input id="apiBase" type="text" placeholder="URL servera (napr. https://archiv.ravafol.sk)" />
    <input id="email" type="email" placeholder="email" autocomplete="username" />
    <input id="password" type="password" placeholder="heslo" autocomplete="current-password" />
    <button id="loginBtn" class="primary">Prihlásiť</button>
    <div id="loginError" class="error"></div>
  </section>

  <!-- Vyhľadávanie -->
  <section id="searchView" class="view hidden">
    <form id="searchForm">
      <input id="query" type="search" placeholder="Hľadať v archíve…" autocomplete="off" />
      <button class="primary" type="submit">Hľadať</button>
    </form>
    <button type="button" id="toggleFilters" class="link" style="margin-top:4px">+ Filtre</button>
    <div id="filters" class="hidden" style="margin-top:6px">
      <input id="fFrom" type="text" placeholder="Od (email)" />
      <input id="fTo" type="text" placeholder="Komu (email)" />
      <div style="display:flex;gap:6px">
        <input id="fDateFrom" type="date" title="Dátum od" />
        <input id="fDateTo" type="date" title="Dátum do" />
      </div>
    </div>
    <div id="status" class="muted"></div>
    <ul id="results"></ul>
    <div id="pager" style="display:flex;align-items:center;justify-content:center;margin-top:10px"></div>
  </section>

  <!-- Zobrazenie e-mailu -->
  <section id="viewerView" class="view hidden">
    <button id="backBtn" class="link">← Späť na výsledky</button>
    <div id="emailMeta"></div>
    <div id="emailBody"></div>
    <div id="attachments"></div>
  </section>

  <script type="module" src="taskpane.js"></script>
</body>
</html>
